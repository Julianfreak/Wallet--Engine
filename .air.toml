root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  # Comando que usa air para compilar. 
  # Guardamos el ejecutable en ./tmp/main para no ensuciar la raíz
  cmd = "go build -o ./tmp/main ./cmd/api"
  
  # La ruta del binario que air ejecutará
  bin = "./tmp/main"
  
  # Directorios que air debe vigilar
  include_dir = ["cmd", "internal"]
  
  # Extensiones que disparan el reinicio
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  
  # Evitar recompilar si solo cambias tests
  exclude_dir = ["assets", "tmp", "vendor", "testdata"]
  delay = 1000 # 1 segundo de espera tras el cambio para evitar builds en bucle
  stop_on_error = true

[log]
  time = true